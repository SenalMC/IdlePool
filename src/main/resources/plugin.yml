# Paper 插件元数据；Paper plugin metadata.
name: IdlePool
version: '${version}'
main: top.cnuo.idlepool.IdlePoolPlugin
description: Kotlin region AFK rewards with leaderboards, weighted pity, multiplier events and transactional operations.
api-version: '1.21'
author: Chirnuo
email: mc@mc.email.cn
website: https://github.com/SenalMC
license: Apache-2.0
softdepend:
  - ItemsAdder
  - Vault
  - MythicMobs
  - MMOItems
  - Slimefun
  - PlaceholderAPI
commands:
  afkpool:
    description: Open or manage IdlePool.
    usage: /afkpool [info|claim|history|stats|top|stop|event|admin|doctor|reload]
    aliases: [idlepool]
permissions:
  idlepool.use:
    description: Use AFK pools.
    default: true
  idlepool.admin:
    description: Manage IdlePool.
    default: op
