name: Bug report
description: 报告可复现的 IdlePool 问题
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。提交前请先执行 `/afkpool doctor` 并移除日志中的敏感信息。
  - type: input
    id: idlepool-version
    attributes:
      label: IdlePool 版本
      placeholder: 1.0.0-rc.4
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Paper 与 Java 版本
      placeholder: Paper 1.21.1 build 133 / Java 21
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述与复现步骤
      placeholder: 请写明预期结果、实际结果和稳定复现步骤。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Doctor 输出与相关日志
      render: text
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: 相关配置
      description: 请移除数据库、地址或其他敏感信息。
      render: yaml
