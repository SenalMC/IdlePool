storage:
  file: data.db
  checkpoint-interval-seconds: 30

update-check:
  enabled: true
  version-url: "https://raw.githubusercontent.com/SenalMC/IdlePool/main/version.txt"
  timeout-seconds: 5

progress:
  default-retention: 7d

actionbar:
  enabled: true
  format: ":clock: <yellow>挂机 <white>{session_time}  :gift: <yellow>下次奖励 <white>{next_reward}  :coin: <green>本次 {earned}"

itemsadder:
  font-images:
    clock: "idlepool:clock"
    gift: "idlepool:gift"
    coin: "idlepool:coin"

inbox:
  retention: permanent
  max-entries-per-player: 500

messages:
  prefix: "<gold>[挂机池]</gold> "
  no-pool: "<red>你当前不在挂机池区域内。"
  no-permission: "<red>你没有使用这个挂机池的权限。"
  already-active: "<yellow>你已经在挂机了。"
  pool-full: "<red>这个挂机池已达到人数上限。"
  started: "<green>已开始在 <white>{pool}</white> 挂机。"
  stopped: "<yellow>挂机已结束，本次挂机 {session_time}。"
  left-region: "<yellow>你离开了挂机池，进度已保存。"
  progress-loading: "<gray>正在读取你的挂机进度……"
  milestone-reached: "<green>连续挂机达到 <white>{time}</white>，里程碑奖励已结算，本次获得 <white>{earned}</white> 项。"
  itemsadder-not-ready: "<yellow>ItemsAdder 资源尚未加载，已使用原版按钮和 ActionBar 文本。"
