name: Feature request
description: 提议 IdlePool 新功能或改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 请说明服主或玩家遇到的实际问题。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述期望的配置方式和玩家体验。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 可接受的替代方案
