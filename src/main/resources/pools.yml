# 配置结构版本；Configuration schema version.
schema-version: 3

# 挂机池示例；可使用 /afkpool admin 在游戏内创建和编辑。
# AFK pool example; use /afkpool admin to create and edit pools in game.
pools:
  spawn:
    # 新示例默认关闭，配置好区域后再启用。
    # Examples are disabled by default; enable after configuring the region.
    enabled: false
    display-name: "<gold>主城挂机池"
    world: world
    # 两个端点会自动组成长方体区域。
    # The two corners automatically form a cuboid region.
    region:
      min: { x: -10, y: 60, z: -10 }
      max: { x: 10, y: 80, z: 10 }
    # 留空表示无需额外权限；0 人表示不限制人数。
    # Leave permission empty for no extra permission; 0 players means unlimited.
    permission: "idlepool.use"
    max-active-players: 50
    # 未满周期进度会保留 progress-retention 指定的时间。
    # Partial-cycle progress is retained for progress-retention.
    reward-cycle: 10m
    progress-retention: 7d
    reward-plan: basic
    # 可选 ItemsAdder 图标；不可用时自动使用原版物品。
    # Optional ItemsAdder icons; vanilla items are used as fallback.
    gui:
      start-item: "idlepool:start_button"
      info-item: "idlepool:info_button"
      rewards-item: "idlepool:rewards_button"
