# 配置结构版本由插件自动维护，请勿手动降低。
# Configuration schema version is maintained automatically; do not downgrade it.
config-version: 2

# 数据库与定时保存设置。
# Database and periodic checkpoint settings.
storage:
  file: data.db
  checkpoint-interval-seconds: 30
  reward-log-retention-days: 30

# 启动时从 GitHub 检查新版本；关闭后 /afkpool info 会显示已禁用。
# Check GitHub for updates on startup; /afkpool info reports when this is disabled.
update-check:
  enabled: true
  version-url: "https://raw.githubusercontent.com/SenalMC/IdlePool/main/version.txt"
  timeout-seconds: 5

# 选择消息文件。默认中文；改为 en.yml 可使用英文。
# Select the message file. Chinese is the default; use en.yml for English.
language:
  file: message.yml

# 新挂机池未单独指定时使用的进度保留期。
# Default partial-progress retention for pools without an explicit value.
progress:
  default-retention: 7d

# ActionBar 文本位于所选语言文件的 actionbar.format。
# ActionBar text is configured as actionbar.format in the selected language file.
actionbar:
  enabled: true

# ItemsAdder 字体图片 ID；ItemsAdder 不可用时会自动退回纯文本。
# ItemsAdder font-image IDs; plain text is used when ItemsAdder is unavailable.
itemsadder:
  font-images:
    clock: "idlepool:clock"
    gift: "idlepool:gift"
    coin: "idlepool:coin"

# 暂存箱永久保留；玩家正常结束或离开挂机池时默认自动打开一次。
# Inbox entries are permanent; the inbox opens once after a normal stop or region exit by default.
inbox:
  retention: permanent
  max-entries-per-player: 500
  open-on-stop: true
  page-size: 45
